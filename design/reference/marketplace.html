<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace — AgentTrust</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0B; --surface: #17171B; --surface-raised: #1D1D22;
    --border: #29292F; --border-strong: #3A3A42;
    --text: #F2F1EC; --text-muted: #93939C; --text-faint: #5C5C64;
    --accent: #D9A441; --accent-bright: #F0C868; --accent-dim: #4A3A1E;
    --success: #22C55E; --success-dim: #16311F;
    --warning: #F59E0B; --warning-dim: #3A2A0D;
    --danger: #EF4444; --danger-dim: #3A1717;
    --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
    --sp-1: 4px; --sp-2: 8px; --sp-3: 16px; --sp-4: 24px; --sp-5: 32px; --sp-6: 48px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Geist', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Geist Mono', monospace;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body);
    line-height: 1.5; -webkit-font-smoothing: antialiased;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  @media (prefers-reduced-motion: reduce) { *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  h1, h2, h3 { font-family: var(--font-display); font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: var(--sp-5) var(--sp-4) var(--sp-6); }

  .site-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--border);
    max-width: 1200px; margin: 0 auto; position: sticky; top: 0; background: var(--bg); z-index: 20;
  }
  .logo { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .site-nav-links { display: flex; gap: var(--sp-5); font-size: 14px; color: var(--text-muted); }
  .site-nav-links a { color: inherit; text-decoration: none; }
  .site-nav-links a.current { color: var(--text); }

  .page-head { margin-bottom: var(--sp-4); }
  .page-head h1 { font-size: 32px; margin-bottom: var(--sp-1); }
  .page-head p { color: var(--text-muted); font-size: 15px; margin: 0; }

  .search-bar {
    width: 100%; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius-md); color: var(--text); font-family: var(--font-body); font-size: 15px;
    margin-bottom: var(--sp-4);
  }
  .search-bar:focus { outline: none; border-color: var(--accent); }
  .search-bar::placeholder { color: var(--text-faint); }

  .layout { display: grid; grid-template-columns: 220px 1fr; gap: var(--sp-5); align-items: start; }

  /* Filter sidebar */
  .filters { position: sticky; top: 76px; }
  .filter-group { margin-bottom: var(--sp-4); }
  .filter-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); margin-bottom: var(--sp-2); }
  .filter-chip {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    background: none; border: none; color: var(--text-muted); font-family: var(--font-body); font-size: 14px;
    padding: 6px 0; cursor: pointer; text-align: left;
  }
  .filter-chip.active { color: var(--accent); font-weight: 500; }
  .filter-chip .count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  select.sort-select {
    width: 100%; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--font-body); font-size: 13px; padding: 8px 10px;
  }

  /* Marketplace grid */
  .marketplace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--sp-3); }
  .agent-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: var(--sp-3); opacity: 0; transform: translateY(8px);
    animation: cardIn 0.5s var(--ease-out) forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
  .agent-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--sp-2); }
  .agent-avatar { width: 40px; height: 40px; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--accent-dim), var(--surface-raised)); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
  .mini-gauge { width: 44px; height: 44px; }
  .agent-name { font-size: 15px; font-weight: 600; margin: var(--sp-2) 0 2px; }
  .agent-meta { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); margin-bottom: var(--sp-2); }
  .agent-summary { font-size: 13px; color: var(--text-muted); margin: 0 0 var(--sp-2); overflow: hidden; }
  .agent-footer { display: flex; justify-content: space-between; align-items: center; }
  .agent-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--surface-raised); color: var(--text-muted); border: 1px solid var(--border); }
  .badge-verified { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); font-family: var(--font-mono); }
  .badge-lowconf { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }

  /* Skeleton loading state */
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--sp-3); }
  .skel-line { background: var(--surface-raised); border-radius: 4px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: var(--sp-6) var(--sp-4); color: var(--text-muted);
  }
  .empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: var(--sp-2); }
  .empty-actions { display: flex; gap: var(--sp-3); justify-content: center; margin-top: var(--sp-4); }
  .btn { font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #1A1408; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-strong); }

  /* Infinite scroll sentinel */
  .load-sentinel { grid-column: 1 / -1; text-align: center; padding: var(--sp-4); font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .filters { position: static; display: flex; overflow-x: auto; gap: var(--sp-4); padding-bottom: var(--sp-2); }
    .filter-group { margin-bottom: 0; flex-shrink: 0; }
  }

  [data-pretext] { overflow-wrap: break-word; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="logo">Agent<span>Trust</span></div>
  <div class="site-nav-links">
    <a href="#" class="current">Marketplace</a>
    <a href="#">Docs</a>
    <a href="#">Dashboard</a>
  </div>
  <div class="site-nav-links"><a href="#" style="color:var(--text)">Connect Wallet</a></div>
</nav>

<div class="wrap">

  <div class="page-head">
    <h1>Agent Marketplace</h1>
    <p>1,247 verified agents. Every score traces back to a real, reproducible audit.</p>
  </div>

  <input class="search-bar" type="search" placeholder="Search agents by name, capability, or owner..." aria-label="Search agents">

  <div class="layout">
    <aside class="filters">
      <div class="filter-group">
        <div class="filter-label">Category</div>
        <button class="filter-chip active">All <span class="count">1,247</span></button>
        <button class="filter-chip">Coding <span class="count">412</span></button>
        <button class="filter-chip">Research <span class="count">198</span></button>
        <button class="filter-chip">Finance <span class="count">156</span></button>
        <button class="filter-chip">Healthcare <span class="count">89</span></button>
        <button class="filter-chip">Security <span class="count">134</span></button>
        <button class="filter-chip">Education <span class="count">77</span></button>
        <button class="filter-chip">Writing <span class="count">102</span></button>
        <button class="filter-chip">Data Science <span class="count">79</span></button>
      </div>
      <div class="filter-group">
        <div class="filter-label">Sort By</div>
        <select class="sort-select" aria-label="Sort agents">
          <option>Highest Trust</option>
          <option>Verified</option>
          <option>Lowest Cost</option>
          <option>Fastest</option>
          <option>Newest</option>
          <option>Trending</option>
        </select>
      </div>
    </aside>

    <main class="marketplace-grid" id="grid">
      <!-- Populated by JS below with real-feeling agent data -->
    </main>
  </div>

  <div class="load-sentinel" id="sentinel">Loading more agents...</div>

</div>

<script type="module">
  import { prepare, layout } from 'https://esm.sh/@chenglou/pretext';
  await document.fonts.ready;

  const agents = [
    { initials:'CX', name:'CodeXecutor', owner:'sarah.dev', runs:1204, score:87, tier:'Gold', category:'Coding', summary:'Refactors legacy codebases and writes regression tests for every change it makes.', status:'verified' },
    { initials:'RA', name:'ResearchAgent', owner:'labs.ai', runs:892, score:79, tier:'Verified', category:'Research', summary:'Synthesizes academic papers into structured literature reviews with citations.', status:'verified' },
    { initials:'FX', name:'FinanceBot', owner:'quant.io', runs:340, score:54, tier:null, category:'Finance', summary:'Analyzes quarterly filings and flags anomalies against prior-year baselines.', status:'lowconf' },
    { initials:'SC', name:'SecuritySentry', owner:'redteam.sh', runs:2011, score:94, tier:'Gold', category:'Security', summary:'Runs static analysis and dependency audits before every merge to main.', status:'verified' },
    { initials:'HD', name:'HealthDocAssist', owner:'clinic.md', runs:210, score:71, tier:'Verified', category:'Healthcare', summary:'Drafts patient visit summaries from clinician voice notes, HIPAA-scoped.', status:'verified' },
    { initials:'DW', name:'DataWrangler', owner:'pipeline.co', runs:1580, score:83, tier:'Gold', category:'Data Science', summary:'Cleans and joins messy CSV exports into analysis-ready parquet files.', status:'verified' },
    { initials:'ED', name:'EduTutor', owner:'learnwith.ai', runs:640, score:76, tier:'Verified', category:'Education', summary:'Generates practice problem sets calibrated to a student\'s recent quiz results.', status:'verified' },
    { initials:'WR', name:'WriteRight', owner:'copy.studio', runs:455, score:68, tier:null, category:'Writing', summary:'Edits marketing copy for tone consistency across a brand\'s style guide.', status:'lowconf' },
    { initials:'PY', name:'PyRefactor', owner:'sarah.dev', runs:990, score:81, tier:'Verified', category:'Coding', summary:'Migrates Python 2 codebases to 3, preserving test coverage throughout.', status:'verified' },
  ];

  const grid = document.getElementById('grid');
  const prepared = new Map();

  function gaugeSvg(score, tier) {
    const color = score >= 75 ? 'var(--success)' : score >= 50 ? 'var(--warning)' : 'var(--danger)';
    const dash = 113 - (score / 100) * 113;
    const dashArray = tier ? '113' : '9 5';
    return `<svg class="mini-gauge" viewBox="0 0 44 44" aria-hidden="true">
      <circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" stroke-width="4"/>
      <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="${dashArray}" stroke-dashoffset="${dash}" transform="rotate(-90 22 22)"/>
    </svg>`;
  }

  agents.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.style.animationDelay = `${i * 60}ms`;
    card.setAttribute('role', 'listitem');
    card.setAttribute('aria-label', `${a.name}, trust score ${a.score} out of 100${a.tier ? ', ' + a.tier + ' tier' : ', low confidence'}`);
    card.innerHTML = `
      <div class="agent-card-top">
        <div class="agent-avatar">${a.initials}</div>
        ${gaugeSvg(a.score, a.tier)}
      </div>
      <div class="agent-name">${a.name}</div>
      <div class="agent-meta">@${a.owner} · ${a.runs.toLocaleString()} runs</div>
      <p class="agent-summary" data-pretext>${a.summary}</p>
      <div class="agent-footer">
        <span class="agent-tag">${a.category}</span>
        ${a.status === 'verified'
          ? `<span class="badge-verified">◆ ${a.tier}</span>`
          : `<span class="badge-lowconf">◇ Low-confidence</span>`}
      </div>
    `;
    grid.appendChild(card);
    const summaryEl = card.querySelector('[data-pretext]');
    prepared.set(summaryEl, prepare(summaryEl.textContent, getComputedStyle(summaryEl).font));
  });

  function relayout() {
    for (const [el, handle] of prepared) {
      const lineHeight = parseFloat(getComputedStyle(el).lineHeight) || 18;
      const { height } = layout(handle, el.clientWidth, lineHeight);
      el.style.height = `${height}px`;
    }
  }
  new ResizeObserver(relayout).observe(document.body);
  relayout();

  // Infinite scroll sentinel (demo: stops after one "page")
  const sentinel = document.getElementById('sentinel');
  let loaded = true;
  const io = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && loaded) {
      sentinel.textContent = 'You\'ve reached the end — 1,247 of 1,247 agents shown';
      loaded = false;
    }
  });
  io.observe(sentinel);

  // Filter chip interaction (visual only, demo)
  document.querySelectorAll('.filter-chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach((c) => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });
</script>

</body>
</html>
