[toolchain]
anchor_version = "0.30.1"

[features]
seeds = false
skip-lint = false

[programs.localnet]
agent_trust = "DQZdU6jeY2SF1bYXNv9NuEW9JK26ZEaRfNjWG4MoqcSX"

[programs.devnet]
agent_trust = "DQZdU6jeY2SF1bYXNv9NuEW9JK26ZEaRfNjWG4MoqcSX"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# A fresh local validator only has our own program deployed — Squads V4
# doesn't exist on it unless cloned. Per the eng review (2026-07-04), tests
# run against a local validator, never devnet directly, so we clone Squads'
# on-chain state from devnet at validator startup instead of pointing the
# whole test run at devnet.
[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.clone]]
address = "SQDS4ep65T869zMMBKyuUq6aD6EgTu8psMjkvj52pCf" # Squads V4 program

[[test.validator.clone]]
address = "BSTq9w3kZwNwpBXJEvTZz2G9ZTNyKBvoSeXMvwb4cNZr" # Squads V4 ProgramConfig PDA

[[test.validator.clone]]
address = "HM5y4mz3Bt9JY9mr1hkyhnvqxSH4H2u2451j7Hc2dtvK" # Squads ProgramConfig treasury/authority

[test]
# Default startup_wait is too short once the validator has to fetch cloned
# accounts over network RPC before it can start serving — bumped from the
# ~5-10s default given Docker-on-Windows I/O overhead on top of that.
startup_wait = 30000
